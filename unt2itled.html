<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Topper | Free Batches</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0a0a10;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Admin Navigation --- */
        header {
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: sticky;
            top: 0;
            background: rgba(10,10,16,0.92);
            backdrop-filter: blur(16px);
            z-index: 50;
        }

        .brand {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.3px;
            background: linear-gradient(120deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .admin-btn {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            background: rgba(139, 92, 246, 0.3);
            border-color: #8b5cf6;
        }

        .code-gen-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: transparent;
        }

        .code-gen-btn:hover {
            background: #059669;
        }

        /* --- Page Title --- */
        .page-title {
            padding: 40px 28px 20px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .page-title span {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* --- Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 25px;
            padding: 20px 5vw 100px;
        }

        .card {
            background: #111119;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(.34,1.4,.64,1), box-shadow 0.3s ease, border-color 0.3s ease;
            animation: up 0.5s ease both;
        }

        @keyframes up {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #0d0d18;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .card:hover .card-img img { transform: scale(1.08); }

        .card-body { padding: 20px; }

        .card-name {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            color: rgba(255,255,255,0.95);
            margin-bottom: 20px;
            min-height: 45px;
        }

        .study-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 0;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .study-btn:hover {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        /* --- Advanced Floating Chat & WhatsApp --- */
        .floating-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .float-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .float-btn:hover { transform: scale(1.1); }

        .whatsapp-btn {
            background: #25D366;
            text-decoration: none;
        }

        .chat-btn {
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            border: none;
        }

        /* Chat Window Panel */
        .chat-window {
            position: fixed;
            bottom: 100px;
            right: 30px;
            width: 350px;
            height: 450px;
            background: #181824;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 99;
            animation: slideUp 0.3s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-header {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 15px 20px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-chat { cursor: pointer; font-size: 20px; }

        .chat-body {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #111119;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
        }

        .chat-input {
            display: flex;
            padding: 15px;
            background: #181824;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .chat-input input {
            flex: 1;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            font-family: inherit;
        }

        .chat-input button {
            background: transparent;
            border: none;
            color: #8b5cf6;
            font-size: 20px;
            margin-left: 10px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; padding: 15px 20px 80px; }
            .chat-window { width: calc(100% - 40px); right: 20px; bottom: 90px; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">Next Topper</div>
    <div class="nav-links">
        <a href="#admin-portal" class="admin-btn"><i class="fas fa-lock"></i> Admin Panel</a>
        <a href="#code-generator" class="admin-btn code-gen-btn"><i class="fas fa-code"></i> Code Generator</a>
    </div>
</header>

<div class="page-title">Explore Free <span>Batches</span></div>

<div class="grid" id="batchGrid">
    </div>

<div class="floating-actions">
    <a href="https://wa.me/YOUR_NUMBER_HERE" target="_blank" class="float-btn whatsapp-btn" title="Contact on WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>
    <button class="float-btn chat-btn" onclick="toggleChat()" title="Open Chat">
        <i class="fas fa-comment-dots"></i>
    </button>
</div>

<div class="chat-window" id="chatWindow">
    <div class="chat-header">
        <span><i class="fas fa-robot"></i> Support Chat</span>
        <span class="close-chat" onclick="toggleChat()">&times;</span>
    </div>
    <div class="chat-body" id="chatBody">
        <p>👋 Hello! Welcome to Next Topper. How can I help you today?</p>
    </div>
    <div class="chat-input">
        <input type="text" placeholder="Type a message..." id="chatMsg">
        <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

        { name: "YouTube Content Creation", id: "69d92a4285d465ca49979239", img: "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/74601c05-e386-4c8a-85b7-11fd0dfde78f.jpg" },

        { name: "Mobile Video Editing", id: "69d92a4155af49c2ea134f24", img: "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/d32c4eb1-eb6c-44a0-982a-ea8b81f2f8e9.jpg" },
        { name: "UDAY 2027 Class 11th Comm.", id: "6984a17d4520f144c34e3745", img: "https://static.pw.live/5eb393ee95fab7468a79d189/ADMIN/82b82785-4e1c-45bc-b7e8-d850741b9258.png" }
    ];

    // Generate Cards Dynamically
    const grid = document.getElementById('batchGrid');
    
    batches.forEach((batch, index) => {
        const delay = index * 0.05; // Staggered animation
        const html = `
            <div class="card" style="animation-delay:${delay}s" onclick="location.href='https://rolexcoderz.in/RC/?batchId=${batch.id}'">
                <div class="card-img">
                    <img src="${batch.img}" alt="${batch.name}" onerror="this.src='https://via.placeholder.com/400x225/111119/ffffff?text=Next+Topper'">
                </div>
                <div class="card-body">
                    <div class="card-name">${batch.name}</div>
                    <a class="study-btn" href="https://rolexcoderz.in/RC/?batchId=${batch.id}" onclick="event.stopPropagation()">
                        <i class="fas fa-play"></i> Start Studying
                    </a>
                </div>
            </div>
        `;
        grid.innerHTML += html;
    });

    // Chat Toggle Logic
    function toggleChat() {
        const chat = document.getElementById('chatWindow');
        chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
    }

    // Basic Chat Send Logic
    function sendMessage() {
        const input = document.getElementById('chatMsg');
        const body = document.getElementById('chatBody');
        if(input.value.trim() !== '') {
            body.innerHTML += `<p style="text-align: right; color: #a78bfa; margin-top: 10px;">${input.value}</p>`;
            input.value = '';
            body.scrollTop = body.scrollHeight; // Auto scroll to bottom
        }
    }
</script>

</body>
</html>
